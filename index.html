<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Najla Alhammadi | Technical Projects</title>
  <meta name="description" content="Portfolio of Najla Alhammadi showcasing AWS, Cloud, Automation, and Technical Projects." />
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #121a33;
      --card: #151f3d;
      --text: #eef2ff;
      --muted: #b8c1e0;
      --line: rgba(255,255,255,0.08);
      --accent: #8b5cf6;
      --accent2: #22d3ee;
      --gold: #fbbf24;
      --shadow: 0 12px 35px rgba(0,0,0,0.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(34,211,238,0.16), transparent 22%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      width: min(1120px, 92%);
      margin: auto;
    }

    .hero {
      padding: 72px 0 36px;
    }

    .hero-box {
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 42px 34px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-box::before,
    .hero-box::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
    }

    .hero-box::before {
      width: 220px;
      height: 220px;
      background: rgba(139,92,246,0.18);
      top: -80px;
      right: -60px;
    }

    .hero-box::after {
      width: 180px;
      height: 180px;
      background: rgba(34,211,238,0.14);
      bottom: -70px;
      left: -60px;
      filter: blur(12px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.1;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      position: relative;
      z-index: 1;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #ffffff;
      font-size: 14px;
    }

    .section-title {
      margin: 38px 0 18px;
      font-size: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 18px rgba(139,92,246,0.55);
    }

    .projects {
      display: grid;
      gap: 22px;
      padding-bottom: 50px;
    }

    .project-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: rgba(139,92,246,0.38);
      box-shadow: 0 18px 42px rgba(0,0,0,0.34);
    }

    .project-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .project-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .project-date {
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(251,191,36,0.12);
      color: #ffe3a1;
      border: 1px solid rgba(251,191,36,0.25);
      font-weight: bold;
      font-size: 14px;
    }

    .project-highlight {
      margin: 0 0 16px;
      padding: 14px 16px;
      border-left: 4px solid var(--accent2);
      background: rgba(34,211,238,0.08);
      border-radius: 12px;
      color: #f7fbff;
    }

    .project-highlight b { color: #ffffff; }

    .project-text {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    ul.project-list {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
    }

    ul.project-list li { margin: 8px 0; }

    .footer {
      padding: 8px 0 42px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .hero { padding-top: 42px; }
      .hero-box { padding: 28px 22px; }
      .project-card { padding: 20px; }
      .project-title { font-size: 22px; }
      .section-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="container">
  <section class="hero">
    <div class="hero-box">
      <h1>Najla Alhammadi</h1>
      <p class="subtitle">AWS • Cloud • Automation • Technical Projects Portfolio</p>
      <div class="badge-row">
        <span class="badge">Cloud Engineering</span>
        <span class="badge">Serverless Solutions</span>
        <span class="badge">AWS Automation</span>
        <span class="badge">Technical Projects</span>
      </div>
    </div>
  </section>

  <h2 class="section-title">Technical Projects</h2>

  <section class="projects">
    <!-- Project cards remain unchanged -->
    <!-- (Your project articles are already well-structured) -->
  </section>

  <footer class="footer">
    © 2026 Najla Alhammadi • Portfolio Website
  </footer>
</div>

</body>
</html>
